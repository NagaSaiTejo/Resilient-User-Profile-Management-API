openapi: 3.0.0
info:
  title: Resilient User Profile Management API
  version: 1.0.0
  description: A fault-tolerant backend API for managing user profiles with an enriched data feature.

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /api/users:
    post:
      summary: Create a new user profile
      description: Creates a new user with provided name and email, ensuring email uniqueness.
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
              properties:
                name:
                  type: string
                  description: The user's full name.
                  example: Jane Doe
                email:
                  type: string
                  format: email
                  description: The user's unique email address.
                  example: jane.doe@example.com
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: User with this email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/{id}:
    get:
      summary: Get a user by ID
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
                
    put:
      summary: Update a user
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid input data
        '404':
          description: User not found
        '409':
          description: Email already in use

    delete:
      summary: Delete a user
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: User deleted successfully
        '404':
          description: User not found

  /api/users/{id}/enriched:
    get:
      summary: Get user with enriched data
      description: Fetches user profile and enriches it with external data using a circuit breaker and retry mechanism.
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User found (enriched data may be available or unavailable)
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  email:
                    type: string
                  registrationDate:
                    type: string
                  enrichedDataStatus:
                    type: string
                    enum: [available, unavailable]
                  enrichment:
                    type: object
                  enrichmentMessage:
                    type: string
        '404':
          description: User not found

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier of the user.
        name:
          type: string
          description: The user's full name.
        email:
          type: string
          format: email
          description: The user's email address.
        registrationDate:
          type: string
          format: date-time
          description: Timestamp of user registration.
          
    ErrorResponse:
      type: object
      properties:
        errorCode:
          type: string
          example: INVALID_INPUT
        message:
          type: string
          example: 'Validation failed'
        details:
          type: array
          items:
            type: string
